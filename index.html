<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Studio - AI Game Design</title><style>
body{
margin:0;
font-family:Arial, sans-serif;
background:radial-gradient(circle at top,#0a0a0a,#050014);
color:#fff;
overflow-x:hidden;
}

header{
background:linear-gradient(90deg,#00f5ff,#7a00ff,#ff00d4);
padding:25px;
text-align:center;
box-shadow:0 0 25px #7a00ff;
}

header h1{
margin:0;
font-size:32px;
letter-spacing:2px;
}

header p{
margin:5px 0 0;
opacity:0.8;
}

.navbar{
display:flex;
justify-content:center;
gap:20px;
padding:10px;
background:#0b0b0b;
border-bottom:1px solid #222;
}

.navbar a{
color:#00f5ff;
text-decoration:none;
font-weight:bold;
}

.container{
padding:20px;
}

.ai-box{
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
margin-bottom:20px;
}

textarea{
width:100%;
height:110px;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
background:#1a1a1a;
color:#fff;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(90deg,#00f5ff,#7a00ff);
color:#fff;
font-size:16px;
font-weight:bold;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#151515;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px rgba(255,0,200,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(0,255,255,0.3);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card p{
text-align:center;
padding:10px;
margin:0;
}

footer{
text-align:center;
padding:20px;
background:#0b0b0b;
color:#888;
margin-top:30px;
}

.telegram{
color:#00f5ff;
font-weight:bold;
}

.loading{
display:none;
text-align:center;
margin-top:10px;
color:#00f5ff;
}

.preview{
width:100%;
margin-top:15px;
border-radius:15px;
display:none;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

.small{
font-size:12px;
opacity:0.7;
margin-top:5px;
}
</style></head><body><header>
<h1>⚡ Nova Studio</h1>
<p>AI Game Design & Free PRO Image Generator</p>
</header><div class="navbar">
<a href="#ai">AI Generator</a>
<a href="#gallerySection">Gallery</a>
<a href="https://t.me/onlyahmed27" target="_blank">Telegram</a>
</div><div class="container"><div class="ai-box">
<h2>🎮 توليد صور احترافي مجاني (PRO Free)</h2>
<p class="small">اكتب وصف دقيق وسنحاول توليد أفضل نتيجة ممكنة مع أكثر من سيرفر</p><textarea id="prompt" placeholder="مثال: محارب فضائي في مدينة نيون مع درع طاقي"></textarea><button id="genBtn" onclick="generateImage()">🚀 توليد الصورة</button>

<div class="loading" id="loading">⏳ جاري توليد صورة احترافية...</div><img id="result" class="preview" />
</div><h2 id="gallerySection">🔥 معرض التصاميم</h2>
<div class="grid" id="galleryGrid"></div></div><footer>
Nova Studio © 2026 | للتواصل: <span class="telegram">@onlyahmed27</span>
</footer><script>

const endpoints = [
  "https://image.pollinations.ai/prompt/",
  "https://pollinations.ai/prompt/"
];

function enhancePrompt(p){
  return "ultra detailed, 4k, cyberpunk game style, highly realistic, cinematic lighting, " + p;
}

async function generateImage(){
let prompt=document.getElementById('prompt').value.trim();
let loading=document.getElementById('loading');
let result=document.getElementById('result');
let btn=document.getElementById('genBtn');

if(!prompt){
alert('اكتب وصف الصورة أولاً');
return;
}

btn.disabled=true;
loading.style.display='block';
result.style.display='none';

let enhanced = enhancePrompt(prompt);
let seed = Math.floor(Math.random()*999999);

let success=false;
let finalUrl="";

for(let i=0;i<endpoints.length;i++){
  try{
    let url = endpoints[i] + encodeURIComponent(enhanced) + "?seed=" + seed;

    await new Promise((resolve,reject)=>{
      let img=new Image();
      img.onload=()=>{finalUrl=url;success=true;resolve();};
      img.onerror=()=>reject();
      img.src=url;
    });

    if(success) break;

  }catch(e){
    continue;
  }
}

loading.style.display='none';
btn.disabled=false;

if(success){
result.src=finalUrl;
result.style.display='block';
addToGallery(finalUrl,prompt);
}else{
alert('فشل التوليد، حاول مرة أخرى');
}
}

function addToGallery(url,prompt){
let g=document.getElementById('galleryGrid');
let card=document.createElement('div');
card.className='card';
card.innerHTML=`<img src="${url}"><p>${prompt}</p>`;
g.prepend(card);
}

</script></body>
</html>
